<!DOCTYPE html>
<html lang="en">
<head>
<title></title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css" integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js" integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
@layer base {
    body {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    #app {
        flex-grow: 1;
        padding-left: 0.65em;
        padding-right: 0.65em;
        margin-bottom: 0.65em;
        margin-top: 0.65em;
    }
}
@layer components {
    .formBlock, .form-block {
        display: flex;
        flex-direction: column;
        margin-bottom: 0.35em;
    }
    .formBlock label, .formBlock label {
        margin-bottom: 0.15em;
    }
}
@layer components {
    .grid-small {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 3px;
        @media(max-width: 1000px) {
            display: block !important;
        }
    }
    .grid-medium {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 3px;
        @media(max-width: 1000px) {
            display: block !important;
        }
    }
    .grid-large {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 3px;
        @media(max-width: 1000px) {
            display: block !important;
        }
    }
}
</style>
</head>
<body>
<noscript>This application requires you to have JavaScript enabled in your browser!</noscript>
<div id="app"></div>
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="fixed_alerts"></div>
<script src="/default.js" type="module"></script>
</body>
</html>
