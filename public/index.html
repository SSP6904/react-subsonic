<!DOCTYPE html>
<html lang="en">
<head>
<title></title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<style>
@layer base {
    div#app {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
}
@layer components {
    .formBlock, .form-block {
        display: flex;
        flex-direction: column;
        margin-bottom: 0.35em;
    }
    .formBlock label, .formBlock label {
        margin-bottom: 0.15em;
    }
}
@layer components {
    .grid-small {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 3px;
        @media(max-width: 1000px) {
            display: block !important;
        }
    }
    .grid-medium {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 3px;
        @media(max-width: 1000px) {
            display: block !important;
        }
    }
    .grid-large {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 3px;
        @media(max-width: 1000px) {
            display: block !important;
        }
    }
}
</style>
</head>
<body>
<noscript>This application requires you to have JavaScript enabled in your browser!</noscript>
<div id="app"></div>
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="fixed_alerts"></div>
<script src="/default.js" type="module"></script>
</body>
</html>
